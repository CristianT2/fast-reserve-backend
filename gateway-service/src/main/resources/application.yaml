server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Permite encontrar servicios por su nombre en Eureka
      routes:
        # --- AUTH SERVICE ---
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        # --- EVENT SERVICE ---
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**

        # --- RESERVATION SERVICE ---
        - id: reservation-service
          uri: lb://reservation-service # 'lb://' significa Load Balanced via Eureka
          predicates:
            - Path=/api/reservations/**

        # --- PAYMENT SERVICE ---
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # URL donde vivirá el Eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true


