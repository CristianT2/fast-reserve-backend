server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
              - Path=/api/auth/**
            - id: event-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/events/**
            - id: reservation-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/reservations/**
            - id: payment-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # URL donde vivirá el Eureka
    register-with-eureka: true
    fetch-registry: true
#  instance:
#    prefer-ip-address: true


