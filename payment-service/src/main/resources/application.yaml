server:
  port: 8084

spring:
  application:
    name: payment-service

  # Configuración de Base de Datos PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5435/payment_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Configuración de RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# Configuración de Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# Configuración de Feign Client
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# Logs para ver qué pasa en el microservicio
logging:
  level:
    org.springframework.web: INFO
    com.fastreserve.paymentservice: DEBUG
